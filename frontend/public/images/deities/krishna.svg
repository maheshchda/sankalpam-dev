      <stop offset="0%" stop-color="#fdf4ff"/>
      <stop offset="100%" stop-color="#e9d5ff"/>
    </linearGradient>
    <linearGradient id="center" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#312e81"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <!-- Peacock feather -->
  <ellipse cx="600" cy="155" rx="25" ry="75" fill="#10b981" opacity="0.7"/>
  <ellipse cx="600" cy="155" rx="14" ry="45" fill="#3b82f6" opacity="0.7"/>
  <ellipse cx="600" cy="145" rx="7" ry="22" fill="#1d4ed8"/>
  <!-- Flute -->
  <rect x="400" y="390" width="400" height="16" rx="8" fill="#92400e"/>
  <circle cx="440" cy="398" r="6" fill="#78350f"/>
  <circle cx="490" cy="398" r="6" fill="#78350f"/>
  <circle cx="540" cy="398" r="6" fill="#78350f"/>
  <circle cx="590" cy="398" r="6" fill="#78350f"/>
  <circle cx="640" cy="398" r="6" fill="#78350f"/>
  <circle cx="690" cy="398" r="6" fill="#78350f"/>
  <circle cx="740" cy="398" r="6" fill="#78350f"/>
  <!-- Divine orb -->
  <circle cx="600" cy="330" r="160" fill="url(#center)" opacity="0.9"/>
  <!-- Crown -->
  <path d="M540 210 L558 172 L578 208 L600 165 L622 208 L642 172 L660 210 Z" fill="#fbbf24"/>
  <text x="600" y="370" text-anchor="middle" font-size="95" font-family="Arial, sans-serif" fill="#c4b5fd" opacity="0.85">P</text>
  <text x="600" y="640" text-anchor="middle" font-size="72" font-family="Arial, sans-serif" fill="#312e81" font-weight="700">Sri Krishna</text>
  <text x="600" y="715" text-anchor="middle" font-size="38" font-family="Arial, sans-serif" fill="#4f46e5">Govinda Gopala</text>
</svg>
