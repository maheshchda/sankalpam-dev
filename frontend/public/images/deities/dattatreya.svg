<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Dattatreya">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#86efac"/>
    </linearGradient>
    <linearGradient id="aura" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <!-- Sacred cow and four dogs hint (dots below) -->
  <ellipse cx="600" cy="580" rx="100" ry="40" fill="#d97706" opacity="0.3"/>
  <!-- Radiant halo circles -->
  <circle cx="600" cy="310" r="220" fill="none" stroke="#fbbf24" stroke-width="8" opacity="0.4"/>
  <circle cx="600" cy="310" r="190" fill="none" stroke="#f59e0b" stroke-width="5" opacity="0.35"/>
  <!-- Three heads suggestion: three overlapping circles -->
  <circle cx="520" cy="310" r="100" fill="url(#aura)" opacity="0.85"/>
  <circle cx="600" cy="280" r="110" fill="url(#aura)" opacity="0.95"/>
  <circle cx="680" cy="310" r="100" fill="url(#aura)" opacity="0.85"/>
  <!-- Trimurti dots -->
  <circle cx="520" cy="310" r="22" fill="#fff7ed"/>
  <circle cx="600" cy="275" r="24" fill="#fff7ed"/>
  <circle cx="680" cy="310" r="22" fill="#fff7ed"/>
  <!-- Trishul hint -->
  <line x1="600" y1="150" x2="600" y2="450" stroke="#6b21a8" stroke-width="8" opacity="0.6"/>
  <line x1="570" y1="175" x2="600" y2="150" stroke="#6b21a8" stroke-width="8" opacity="0.6"/>
  <line x1="630" y1="175" x2="600" y2="150" stroke="#6b21a8" stroke-width="8" opacity="0.6"/>
  <text x="600" y="640" text-anchor="middle" font-size="72" font-family="Arial, sans-serif" fill="#14532d" font-weight="700">Dattatreya</text>
  <text x="600" y="715" text-anchor="middle" font-size="38" font-family="Arial, sans-serif" fill="#166534">Trimurti Avatara</text>
</svg>
