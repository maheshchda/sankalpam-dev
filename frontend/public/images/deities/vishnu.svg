<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Vishnu">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#a7f3d0"/>
    </linearGradient>
    <linearGradient id="center" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#0c4a6e"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <!-- Sudarshana Chakra (spinning disc) -->
  <circle cx="750" cy="260" r="80" fill="none" stroke="#f59e0b" stroke-width="12"/>
  <circle cx="750" cy="260" r="55" fill="none" stroke="#f59e0b" stroke-width="6"/>
  <circle cx="750" cy="260" r="22" fill="#fbbf24"/>
  <line x1="750" y1="180" x2="750" y2="340" stroke="#f59e0b" stroke-width="5"/>
  <line x1="670" y1="260" x2="830" y2="260" stroke="#f59e0b" stroke-width="5"/>
  <line x1="694" y1="204" x2="806" y2="316" stroke="#f59e0b" stroke-width="5"/>
  <line x1="694" y1="316" x2="806" y2="204" stroke="#f59e0b" stroke-width="5"/>
  <!-- Shankha (conch) -->
  <ellipse cx="450" cy="260" rx="45" ry="65" fill="#f1f5f9" stroke="#94a3b8" stroke-width="6"/>
  <path d="M430 280 Q440 230 470 250 Q490 270 460 300Z" fill="#e2e8f0"/>
  <!-- Lotus -->
  <ellipse cx="600" cy="530" rx="90" ry="30" fill="#f9a8d4" opacity="0.6"/>
  <path d="M540 530 Q570 470 600 450 Q630 470 660 530 Q630 510 600 500 Q570 510 540 530Z" fill="#ec4899" opacity="0.7"/>
  <!-- Divine orb -->
  <circle cx="600" cy="320" r="160" fill="url(#center)" opacity="0.9"/>
  <!-- Crown -->
  <path d="M540 200 L560 162 L580 198 L600 155 L620 198 L640 162 L660 200 Z" fill="#fbbf24"/>
  <text x="600" y="365" text-anchor="middle" font-size="95" font-family="Arial, sans-serif" fill="#bae6fd" opacity="0.85">P</text>
  <text x="600" y="640" text-anchor="middle" font-size="72" font-family="Arial, sans-serif" fill="#0c4a6e" font-weight="700">Vishnu</text>
  <text x="600" y="715" text-anchor="middle" font-size="38" font-family="Arial, sans-serif" fill="#0284c7">Sri Narayana</text>
</svg>
