<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-label="Khatu Shyam Ji">
  <defs>
    <linearGradient id="ks-bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fdf2f8"/>
      <stop offset="100%" stop-color="#fbcfe8"/>
    </linearGradient>
    <linearGradient id="ks-orb" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="ks-flag" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%" stop-color="#dc2626"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#ks-bg)"/>

  <!-- Dhwaja / sacred flag pole -->
  <line x1="840" y1="110" x2="840" y2="540" stroke="#92400e" stroke-width="10" stroke-linecap="round"/>
  <polygon points="840,115 840,230 995,172" fill="url(#ks-flag)"/>
  <!-- Flag fringe dots -->
  <circle cx="858" cy="232" r="6" fill="#fbbf24"/>
  <circle cx="876" cy="235" r="6" fill="#fbbf24"/>
  <circle cx="894" cy="237" r="6" fill="#fbbf24"/>

  <!-- Morpankh (peacock feather) above orb -->
  <ellipse cx="600" cy="152" rx="20" ry="70" fill="#10b981" opacity="0.8"/>
  <ellipse cx="600" cy="152" rx="11" ry="43" fill="#3b82f6" opacity="0.8"/>
  <ellipse cx="600" cy="143" rx="5" ry="19" fill="#1d4ed8"/>
  <!-- Small side feathers -->
  <ellipse cx="560" cy="165" rx="13" ry="48" fill="#10b981" opacity="0.55" transform="rotate(-12,560,165)"/>
  <ellipse cx="640" cy="165" rx="13" ry="48" fill="#10b981" opacity="0.55" transform="rotate(12,640,165)"/>

  <!-- Lotus base -->
  <ellipse cx="600" cy="508" rx="115" ry="34" fill="#f9a8d4" opacity="0.55"/>
  <path d="M508 508 Q548 438 600 418 Q652 438 692 508 Q652 486 600 476 Q548 486 508 508Z" fill="#ec4899" opacity="0.65"/>

  <!-- Divine orb -->
  <circle cx="600" cy="332" r="162" fill="url(#ks-orb)" opacity="0.93"/>

  <!-- Crown (Mukut) -->
  <path d="M533 210 L553 168 L575 207 L600 162 L625 207 L647 168 L667 210 Z" fill="#fbbf24"/>
  <circle cx="600" cy="172" r="11" fill="#ec4899"/>
  <circle cx="553" cy="185" r="7" fill="#f59e0b"/>
  <circle cx="647" cy="185" r="7" fill="#f59e0b"/>

  <!-- Decorative star / divine light rays -->
  <circle cx="600" cy="332" r="175" fill="none" stroke="#bfdbfe" stroke-width="3" opacity="0.45"/>
  <circle cx="600" cy="332" r="190" fill="none" stroke="#93c5fd" stroke-width="2" opacity="0.3"/>

  <!-- "SHYAM" lettering inside orb -->
  <text x="600" y="310" text-anchor="middle" font-size="64" font-family="Georgia, serif" fill="#bfdbfe" font-weight="700" opacity="0.9">SHYAM</text>
  <!-- Subtitle inside orb -->
  <text x="600" y="378" text-anchor="middle" font-size="32" font-family="Arial, sans-serif" fill="#dbeafe" opacity="0.75">Hare Ka Sahara</text>

  <!-- Name label -->
  <text x="600" y="640" text-anchor="middle" font-size="64" font-family="Arial, sans-serif" fill="#1e3a8a" font-weight="700">Khatu Shyam Ji</text>
  <text x="600" y="715" text-anchor="middle" font-size="38" font-family="Arial, sans-serif" fill="#2563eb">Balia Baba</text>
</svg>
